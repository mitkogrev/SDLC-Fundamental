spring.application.name=task-manager-backend
server.port=8080

# H2 Database – named in-memory DB shared via H2 TCP Server (started by H2ServerConfig)
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' keeps the schema intact between restarts; MCP server also connects to the same DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 TCP Server – exposes the in-memory DB on port 9092 for the MCP server
h2.tcp.server.port=9092
